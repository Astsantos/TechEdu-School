</head>
<body>
 
<header>
    <input type="checkbox" id="toggler">

    <label for="toggler" class="fas fa-bars"></label>
 
    <a href="index.html" class="logo">TechEdu</a>


    <nav class="navbar">
        <a href="index.html">Página de Cursos</a>
        <a href="atendimento.html">Atendimento</a>
        <a href="areaaluno.html">Área do aluno</a>

    <div class="pages">

     <i class="ia">/</i>
     <a href="criarconta.html" class="pages-btn">Registre-se</a>

    <div class="icons">
      <a href="perfil.html" class="fas  fa-user-circle"></a>
    </div>

</header>
 
<section class="home">
    <div class="content">
        <div class="menu-links">
            <a href="index.html"><i class="fas fa-home"></i> Home</a>
            <a href="cursoaluno.html"><i class="fas fa-laptop"></i> Meus Cursos</a>
            <a href="atendimento.html"><i class="fas fa-phone-alt"></i> Contatos</a>
        </div>
    </div>

  <div class="matricula-box">
            <div class="matricula-content">
                <h2>Primeira Matricula</h2>
            </div>
 
            <div class="matricula-grid">
 
                <div class="field">
                    <label>Nome Completo</label>
                    <input type="text">
                </div>
 
                <div class="field">
                    <label>Confirme o E-mail</label>
                    <input type="email">
                </div>
 
                <div class="field">
                    <label>Data de Nascimento</label>
                    <input type="date">
                </div>
 
                <div class="field-row">
                    <div class="field">
                        <label>Endereço</label>
                    <input type="text">
                </div>
                    <div class="field">
                        <label>Cep</label>
                        <input type="text" maxlength="9">
                    </div>
                    
                </div>

                    <div class="field">
                        <label>Telefone</label>
                        <input type="text">
                    </div>

                <div class="field">
                    <label>CPF</label>
                    <input type="text" maxlength="14">
                </div>
                </div>

                <div class="matricula-footer">
                    <button class="btn-continue">Continue »</button>
                </div>
            </div>
 
            
        </div>
 
    </div>
</section>
