<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechEdu School</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../style/style.css">
</head>

<body>

    <header>
        <input type="checkbox" id="toggler">
        <label for="toggler" class="fas fa-bars"></label>
        <a href="index.html" class="logo">TechEdu</a>

        <nav class="navbar">
            <a href="index.html">Página de Cursos</a>
            <a href="atendimento.html">Atendimento</a>
            <a href="areaaluno.html">Área do aluno</a>
        </nav>

        <div class="pages">
            <a href="login.html" class="pages-btn">Login</a>
            <i class="ia">/</i>
            <a href="criarconta.html" class="pages-btn">Registre-se</a>
        </div>

        <div class="icons">
            <a href="perfil.html" class="fas fa-user-circle"></a>
        </div>
    </header>

    <section class="home">
        <div class="content">
            <div class="menu-links">
                <a href="index.html"><i class="fas fa-home"></i> Home</a>
                <a href="areaaluno.html"><i class="fas fa-laptop"></i> Meus Cursos</a>
                <a href="atendimento.html"><i class="fas fa-phone-alt"></i> Contatos</a>
            </div>

            <div class="perfil-container">
                <div class="perfil-card">
                    <div class="perfil-foto">
                        <i class="fas fa-user"></i>
                    </div>

                    <h2 id="perfil-nome">Carregando...</h2>
                    <p id="perfil-descricao">Estudante</p>

                    <div class="perfil-info">
                        <div class="info-box">
                            <span>Email</span>
                            <strong id="perfil-email">-</strong>
                        </div>
                        <div class="info-box">
                            <span>Cursos</span>
                            <strong>2 ativos</strong>
                        </div>
                        <div class="info-box">
                            <span>Certificados</span>
                            <strong>2 concluídos</strong>
                        </div>
                    </div>

                    <div class="perfil-buttons">
                        <a href="editarperfil.html">Editar Perfil</a>
                        <a href="#" id="btn-sair">Sair</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        const usuario = JSON.parse(localStorage.getItem("usuarioLogado"));

        if (!usuario) {
            window.location.href = "login.html";
        } else {
            document.getElementById("perfil-nome").textContent = usuario.nome || "Usuário";
            document.getElementById("perfil-email").textContent = usuario.email || "-";

            if (usuario.descricao) {
                document.getElementById("perfil-descricao").textContent = usuario.descricao;
            }

            document.getElementById("btn-sair").addEventListener("click", function (e) {
                e.preventDefault();
                localStorage.removeItem("usuarioLogado");
                localStorage.removeItem("token_curso");
                window.location.href = "index.html";
            });
        }
    </script>

</body>

</html>
