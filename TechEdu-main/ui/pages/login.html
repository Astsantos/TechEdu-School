
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechEdu School</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../style/style.css">
</head>

<body>

    <div class="login-page">
        <div class="login-card">
            <h2 class="login-title">Bem-vindo de volta</h2>
            
            <form class="login-form" id="login">
                <label class="login-label" for="email">E-mail:</label>
                <input class="login-input" type="email" id="email" name="email" required>

                <label class="login-label" for="senha">Senha:</label>
                <input class="login-input" type="password" id="senha" name="senha" required>

                <a href="#" class="login-forgot">Esqueceu a senha?</a>
                <button class="login-btn" type="submit">Continue »</button>
            </form>
            
            <div class="login-divider">
                <span>OR</span>
            </div>

            <a class="login-btn" href="criarconta.html">Criar uma conta »</a>
        </div>
    </div>

    <script type="module" src="../scripts/auth.js"></script>
</body>

</html>
