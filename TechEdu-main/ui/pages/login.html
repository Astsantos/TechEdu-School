<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechEdu School</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

<div class="login-page">
    <div class="login-card">
        <h2 class="login-title">Bem-vindo de volta</h2>
        <form class="login-form" action="index.html">
            <label class="login-label">E-mail:</label>
            <input class="login-input" type="email">
            <label class="login-label">Senha:</label>
            <input class="login-input" type="password">
            <a href="#" class="login-forgot">Esqueceu a senha?</a>
           <button class="login-btn" type="submit">Continue »</button>
            <div class="login-divider">
                <span>OR</span>
            </div>
            
        </form>
        <form action="criarconta.html">
                <button class="login-btn" type="submit">Criar uma conta »</button>
            </form>
    </div>
</div>
  
</body>
</html>
